<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Verity academic fairness landing page screenshot style preview</title>
  <desc id="desc">Light landing page preview for a student project intelligence and collaboration platform.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.58" stop-color="#f3f8fc"/>
      <stop offset="1" stop-color="#eef9fb"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#4b3cff"/>
      <stop offset="0.48" stop-color="#03bfb7"/>
      <stop offset="1" stop-color="#10a5f5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#12213d" flood-opacity="0.16"/>
    </filter>
    <filter id="titleShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#152037" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="720" fill="url(#pageBg)"/>

