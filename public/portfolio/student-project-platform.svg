    <circle cx="1180" cy="318" r="6" fill="#a886ff"/>
    <circle cx="1256" cy="110" r="5" fill="#ff7894"/>
    <circle cx="1322" cy="396" r="5" fill="#f6bd49"/>
    <circle cx="1480" cy="188" r="6" fill="#ff7894"/>
    <circle cx="1562" cy="268" r="5" fill="#f6bd49"/>
  </g>

  <g opacity="0.36" stroke="#d8e2ec" stroke-width="1">
    <path d="M0 160H1600M0 320H1600M0 480H1600M0 640H1600"/>
    <path d="M80 0V720M240 0V720M400 0V720M560 0V720M720 0V720M880 0V720M1040 0V720M1200 0V720M1360 0V720M1520 0V720"/>
  </g>

  <g filter="url(#softShadow)">
