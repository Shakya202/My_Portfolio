    <rect x="1245" y="42" width="1" height="38" fill="#e6edf5"/>
    <circle cx="202" cy="61" r="20" fill="#6659ff"/>
    <path d="M194 52h8c3 0 5 2 5 5v13c0-3-2-5-5-5h-8zM210 52h8c3 0 5 2 5 5v13c0-3-2-5-5-5h-8z" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
    <text x="232" y="70" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#17233b">Verity</text>
