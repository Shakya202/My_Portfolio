    <tspan x="800" dy="40">logs, and task completion into one irrefutable contribution matrix.</tspan>
  </text>

  <g filter="url(#softShadow)" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">
    <rect x="495" y="624" width="306" height="70" rx="35" fill="#5538f3"/>
    <text x="648" y="668" text-anchor="middle" fill="#ffffff">Start Building Teams</text>
    <path d="M744 657h15m-6-7 8 7-8 7" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
