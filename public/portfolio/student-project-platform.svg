    <text x="960" y="668" text-anchor="middle" fill="#2e3b52">See How It Works</text>
    <path d="M1046 657 1053 664 1046 671" fill="none" stroke="#64728c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
