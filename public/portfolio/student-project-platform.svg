    <path d="M96 402 28 78 322 96 528 202 784 532 1014 164 1322 396 1562 268" fill="none"/>
  </g>

  <g>
    <circle cx="28" cy="78" r="5" fill="#f6bd49"/>
    <circle cx="160" cy="140" r="7" fill="#ff7894"/>
    <circle cx="212" cy="264" r="5" fill="#8b6cff"/>
    <circle cx="96" cy="402" r="5" fill="#f6bd49"/>
    <circle cx="232" cy="550" r="6" fill="#ff7894"/>
    <circle cx="410" cy="492" r="5" fill="#f6bd49"/>
    <circle cx="528" cy="202" r="4" fill="#f6bd49"/>
    <circle cx="655" cy="470" r="7" fill="#a886ff"/>
    <circle cx="742" cy="134" r="5" fill="#ff7894"/>
    <circle cx="928" cy="408" r="5" fill="#ff7894"/>
