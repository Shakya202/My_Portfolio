    <text x="718" y="70" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#62728c">How It Works</text>
    <text x="872" y="70" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#62728c">Pricing</text>
