    <rect x="1312" y="42" width="138" height="39" rx="19.5" fill="#5538f3"/>
    <text x="1348" y="68" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Get Started</text>
    <path d="M1332 54a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 15v-3a6 6 0 0 0-6-6h-1m7-10v10m-5-5h10" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <g transform="translate(640 170)">
    <rect x="0" y="0" width="320" height="36" rx="18" fill="#f3f7ff" stroke="#cfdcff"/>
    <circle cx="22" cy="18" r="7" fill="#6b68ff"/>
    <text x="38" y="24" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#4d35df">VERITY AURA INTELLIGENCE</text>
    <path d="M294 13 300 18 294 23" fill="none" stroke="#4d35df" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#titleShadow)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <text x="800" y="333" font-size="106" font-weight="900" fill="#172136">The standard for</text>
    <text x="800" y="438" font-size="108" font-weight="900" fill="url(#wordGrad)">academic fairness.</text>
  </g>

  <text x="800" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700" fill="#64728c">
